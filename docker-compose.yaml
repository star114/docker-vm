services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_IMAGE_TAG}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
      # RDP Port:
      - "3389:3389"
    volumes:
      - ${DATA_ROOT:-.}/nginx-proxy-manager/data:/data
      - ${DATA_ROOT:-.}/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^2\\.[0-9]+\\.[0-9]+$"

  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_IMAGE_TAG}
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - WEBSOCKET_ENABLED=true
    volumes:
      - ${DATA_ROOT:-.}/vaultwarden:/data
    ports:
      - "8080:80"
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^1\\.[0-9]+\\.[0-9]+$"

  teslamate-db:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: teslamate-db
    restart: unless-stopped
    stop_grace_period: 1m
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ${DATA_ROOT:-.}/teslamate/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.max_tags=20"
      - "diun.include_tags=^17\\.[0-9]+-trixie$"

  teslamate:
    image: teslamate/teslamate:${TESLAMATE_IMAGE_TAG}
    container_name: teslamate
    restart: unless-stopped
    depends_on:
      teslamate-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_USER=${DB_USER}
      - DATABASE_PASS=${DB_PASSWORD}
      - DATABASE_NAME=${DB_NAME}
      - DATABASE_HOST=teslamate-db
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - TZ=Asia/Seoul
    ports:
      - "4000:4000"
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^3\\.[0-9]+\\.[0-9]+$"

  teslamate-grafana:
    image: teslamate/grafana:${TESLAMATE_GRAFANA_IMAGE_TAG}
    container_name: teslamate-grafana
    restart: unless-stopped
    depends_on:
      teslamate-db:
        condition: service_healthy
      teslamate:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_USER=${DB_USER}
      - DATABASE_PASS=${DB_PASSWORD}
      - DATABASE_NAME=${DB_NAME}
      - DATABASE_HOST=teslamate-db
      - GRAFANA_PASSWD=${GF_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ${DATA_ROOT:-.}/teslamate/grafana:/var/lib/grafana
    ports:
      - "5000:3000"
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^3\\.[0-9]+\\.[0-9]+$"

  portainer:
    image: portainer/portainer-ce:${PORTAINER_IMAGE_TAG}
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-.}/portainer:/data
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^2\\.[0-9]+\\.[0-9]+$"

  diun:
    image: crazymax/diun:${DIUN_IMAGE_TAG}
    container_name: diun
    command: serve
    volumes:
      - ${DATA_ROOT:-.}/diun/data:/data
      - ./diun/diun.yml:/diun.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: Asia/Seoul
      LOG_LEVEL: info
      DIUN_NOTIF_TELEGRAM_TOKEN: ${DIUN_TELEGRAM_BOT_TOKEN}
      DIUN_NOTIF_TELEGRAM_CHATIDS: ${DIUN_TELEGRAM_CHAT_IDS}
    restart: unless-stopped
    labels:
      - "diun.enable=true"
      - "diun.watch_repo=true"
      - "diun.notify_on=new"
      - "diun.sort_tags=semver"
      - "diun.max_tags=20"
      - "diun.include_tags=^4\\.[0-9]+\\.[0-9]+$"

  diun-major:
    image: crazymax/diun:${DIUN_IMAGE_TAG}
    container_name: diun-major
    command: serve
    volumes:
      - ${DATA_ROOT:-.}/diun-major/data:/data
      - ./diun/diun-major.yml:/diun.yml:ro
      - ./diun/major-images.yml:/major-images.yml:ro
    environment:
      TZ: Asia/Seoul
      LOG_LEVEL: info
      DIUN_NOTIF_TELEGRAM_TOKEN: ${DIUN_TELEGRAM_BOT_TOKEN}
      DIUN_NOTIF_TELEGRAM_CHATIDS: ${DIUN_TELEGRAM_CHAT_IDS}
    restart: unless-stopped
